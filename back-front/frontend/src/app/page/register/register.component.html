<div class="page">

  <div class="card">

    <h1>Crea account</h1>
    <p class="subtitle">Registrati alla piattaforma Prospettiva</p>

    <form (ngSubmit)="register()" [formGroup]="registerForm">

      
      <label>First Name</label>
      <div class="input-box">
        <span class="icon">👤</span>
        <input type="text" formControlName="firstName" placeholder="Mario">
      </div>

      
      <label>Last Name</label>
      <div class="input-box">
        <span class="icon">👤</span>
        <input type="text" formControlName="lastName" placeholder="Rossi">
      </div>

      <!-- EMAIL -->
      <label>Email</label>
      <div class="input-box">
        <span class="icon">✉</span>
        <input type="email" formControlName="email" placeholder="nome@azienda.it">
      </div>

      <!-- PASSWORD -->
      <label>Password</label>
      <div class="input-box">
        <span class="icon">🔒</span>
        <input type="password" formControlName="password" placeholder="••••••••">
      </div>

          <label>Conferma Password</label>
        <div class="input-box">
          <span class="icon">🔒</span>
          <input
            type="password"
            formControlName="confirmPassword"
            placeholder="••••••••">
        </div>


      <!-- ERROR -->
      <div class="error" *ngIf="registerError">
        {{ registerError }}
      </div>

      <!-- BUTTON -->
      <button type="submit">
        Registrati →
      </button>

    </form>

    <div class="footer">
      Hai già un account?
      <a [routerLink]="['/login']">Accedi</a>
    </div>

  </div>

</div>
